name: Bug report
description: Something isn't working as expected.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - Self-hosted worker version (tag or commit):
        - Agent (Claude Code / OpenCode / Codex / other):
        - OS:
    validations:
      required: true
