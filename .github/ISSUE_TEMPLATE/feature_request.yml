name: Feature request
description: Propose a new capability or improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you ran into a limitation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What would you like to see? Before proposing, check
        [ROADMAP.md](../../ROADMAP.md) for non-goals — some things are
        intentionally out of scope.
    validations:
      required: true
