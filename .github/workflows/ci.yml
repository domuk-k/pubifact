name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  shell:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck skills/pubifact/*.sh

      - name: install shfmt
        run: |
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 \
            -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt
          shfmt --version

      - name: shfmt check
        run: shfmt -d -i 2 -ci skills/pubifact tests

      - name: install bats
        run: sudo apt-get update -q && sudo apt-get install -y bats

      - name: bats
        run: bats tests/
